<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Upload Photos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-lg shadow-xl text-center">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Admin Photo Upload</h2>

    <button id="upload_widget"
      class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300">
      Select & Upload Photos
    </button>

    <p class="mt-4 text-sm text-gray-500">Note: Uploaded photos will automatically get the 'mygallery' tag.</p>
    <a href="index.html" class="block mt-6 text-blue-500 underline">Back to Gallery</a>
  </div>



  <script>
    
  document.getElementById("upload_widget").addEventListener("click", function () {
      const cloudName = "Sajedulislam";
      const uploadPreset = "my_preset"; // Ekhane preset-er naam thikmoto din

      cloudinary.openUploadWidget({
        cloudName: cloudName,
        uploadPreset: uploadPreset,
        tags: ['mygallery'],
        
        // --- MULTIPLE SELECTION SETTINGS ---
        multiple: true,           // Ekshathe onekgulo select kora jabe
        maxFiles: 50,             // Ekbare sorbocho koyti chhobi upload korte parben (icchemoto barate paren)
        showCompletedButton: true, // Upload sesh hole 'Done' button dekhabe
        clientAllowedFormats: ["images"], // Shudhu images allow korbe
        
      }, (error, result) => {
        if (error) {
          // Ekhane error-ti screen-e dekhabe
          console.error("Cloudinary Error:", error);
          alert("Error: " + JSON.stringify(error));
        }
        if (!error && result && result.event === "success") {
          alert("Uploaded! Refresh the gallery.");
        }
      });
      
    }, false);
  </script>
</body>

</html>
